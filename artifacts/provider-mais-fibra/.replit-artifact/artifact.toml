kind = "web"
previewPath = "/"
title = "Provider Mais Fibra"
version = "1.0.0"
id = "artifacts/provider-mais-fibra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26022

[services.development]
run = "pnpm --filter @workspace/provider-mais-fibra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/provider-mais-fibra", "run", "build" ]
publicDir = "artifacts/provider-mais-fibra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26022"
BASE_PATH = "/"
